<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <title>Juliano | Desenvolvedor</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: #020617;
      align-items: center;
    }

    header h3 {
      color: #38bdf8;
      font-size: 1.5rem;
    }

    nav {
      display: flex;
    }

    header a {
      color: #38bdf8;
      text-decoration: none;
      margin-left: 20px;
      transition: opacity 0.3s;
    }

    header a:hover {
      opacity: 0.7;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .btn {
      background: #38bdf8;
      color: #020617;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    section {
      padding: 60px 20px;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      margin-bottom: 20px;
      color: #38bdf8;
      font-size: 1.8rem;
    }

    .galeria {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }

    .galeria img {
      width: 100%;
      height: 300px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid #334155;
      transition: transform 0.3s, border-color 0.3s;
    }

    .galeria img:hover {
      transform: scale(1.05);
      border-color: #38bdf8;
    }

    .contato-link {
      color: #38bdf8;
      text-decoration: none;
      transition: opacity 0.3s;
    }

    .contato-link:hover {
      opacity: 0.7;
      text-decoration: underline;
    }

    /* RESPONSIVO */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 20px;
        padding: 20px;
      }

      nav {
        flex-direction: column;
      }

      header a {
        margin-left: 0;
        margin-top: 10px;
      }

      .hero h1 {
        font-size: 1.8rem;
      }

      .hero {
        padding: 50px 20px;
      }

      .galeria {
        grid-template-columns: 1fr 1fr;
      }

      section {
        padding: 40px 15px;
      }
    }

  </style>
</head>
